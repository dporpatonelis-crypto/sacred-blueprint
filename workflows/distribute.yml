name: Distribute Lesson Data to App Repos

on:
  push:
    branches: [main]
    paths:
      - "data/current/**"

jobs:
  distribute:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout sacred-blueprint
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed files
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- data/current/)
          echo "Files changed:"
          echo "$CHANGED"
          echo "timeline=$(echo "$CHANGED"      | grep -c 'timeline.json'      || true)" >> $GITHUB_OUTPUT
          echo "investigation=$(echo "$CHANGED" | grep -c 'investigation.json' || true)" >> $GITHUB_OUTPUT
          echo "history3d=$(echo "$CHANGED"     | grep -c 'history3d.json'     || true)" >> $GITHUB_OUTPUT
          echo "mindpalace=$(echo "$CHANGED"    | grep -c 'mindpalace.json'    || true)" >> $GITHUB_OUTPUT
          echo "notebook=$(echo "$CHANGED"      | grep -c 'notebook.json'      || true)" >> $GITHUB_OUTPUT
          echo "personalpage=$(echo "$CHANGED"  | grep -c 'personalpage.json'  || true)" >> $GITHUB_OUTPUT

      - name: Configure git
        run: |
          git config --global user.name  "Sacred Blueprint Bot"
          git config --global user.email "bot@sacred-blueprint"

      # ════════════════════════════════════════════════════════════
      # 🗺️ TIMELINE → Map-Timeline
      # Αντιγράφει timeline JSON + ενημερώνει catalog.json
      # ════════════════════════════════════════════════════════════
      - name: Push → Map-Timeline
        if: steps.changed.outputs.timeline != '0'
        env:
          PAT: ${{ secrets.DEPLOY_PAT }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/dporpatonelis-crypto/Map-Timeline.git /tmp/Map-Timeline

          LESSON_ID=$(jq -r '.lesson_id // "lesson"' data/current/active_lesson.json 2>/dev/null || echo "lesson")
          TITLE=$(jq -r '.title // "Μάθημα"' data/current/active_lesson.json 2>/dev/null || echo "Μάθημα")
          TODAY=$(date +%Y-%m-%d)

          mkdir -p /tmp/Map-Timeline/data
          cp data/current/timeline.json /tmp/Map-Timeline/data/${LESSON_ID}.json
          cp data/current/active_lesson.json /tmp/Map-Timeline/active_lesson.json

          python3 - <<PYEOF
import json, os

catalog_path = "/tmp/Map-Timeline/catalog.json"
try:
    with open(catalog_path, "r", encoding="utf-8") as f:
        catalog = json.load(f)
except:
    catalog = {"scenarios": []}
if "scenarios" not in catalog:
    catalog["scenarios"] = []

lesson_id = "${LESSON_ID}"
entry = {
    "id": lesson_id, "title": "${TITLE}", "type": "timeline",
    "status": "complete", "dataFile": f"data/{lesson_id}.json",
    "updatedAt": "${TODAY}"
}
existing = next((s for s in catalog["scenarios"] if s["id"] == lesson_id), None)
if existing:
    catalog["scenarios"][catalog["scenarios"].index(existing)] = entry
    print(f"  ~ Updated: {lesson_id}")
else:
    catalog["scenarios"].append(entry)
    print(f"  + Added: {lesson_id}")

with open(catalog_path, "w", encoding="utf-8") as f:
    json.dump(catalog, f, indent=2, ensure_ascii=False)
print("catalog.json written.")
PYEOF

          cd /tmp/Map-Timeline
          git add data/ catalog.json active_lesson.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "lesson-data: update timeline ${LESSON_ID} [bot]"
          git push
          echo "✅ Map-Timeline updated (lesson: ${LESSON_ID})"

      # ════════════════════════════════════════════════════════════
      # 🕵️ INVESTIGATION → idea-weaver-board
      # Path: src/data/library/
      # ════════════════════════════════════════════════════════════
      - name: Push → idea-weaver-board
        if: steps.changed.outputs.investigation != '0'
        env:
          PAT: ${{ secrets.DEPLOY_PAT }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/dporpatonelis-crypto/idea-weaver-board.git /tmp/idea-weaver-board

          LESSON_ID=$(jq -r '.lesson_id // "lesson"' data/current/active_lesson.json 2>/dev/null || echo "lesson")

          mkdir -p /tmp/idea-weaver-board/src/data/library
          cp data/current/investigation.json /tmp/idea-weaver-board/src/data/library/${LESSON_ID}.json

          cd /tmp/idea-weaver-board
          git add src/data/library/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "lesson-data: update investigation ${LESSON_ID} [bot]"
          git push
          echo "✅ idea-weaver-board updated (src/data/library/${LESSON_ID}.json)"

      # ════════════════════════════════════════════════════════════
      # 🏛️ HISTORY 3D → history-explorer-3d
      # Transform skill format → Lovable app format + manifest update
      # ════════════════════════════════════════════════════════════
      - name: Push → history-explorer-3d
        if: steps.changed.outputs.history3d != '0'
        env:
          PAT: ${{ secrets.DEPLOY_PAT }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/dporpatonelis-crypto/history-explorer-3d.git /tmp/history-explorer-3d

          LESSON_ID=$(jq -r '.lesson_id // "lesson"' data/current/active_lesson.json 2>/dev/null || echo "lesson")
          TITLE=$(jq -r '.title // "Μάθημα"' data/current/active_lesson.json 2>/dev/null || echo "Μάθημα")
          TODAY=$(date +%Y-%m-%d)

          python3 - <<PYEOF
import json, os

src_path  = "data/current/history3d.json"
out_dir   = "/tmp/history-explorer-3d/public/data"
lesson_id = "${LESSON_ID}"
title     = "${TITLE}"
today     = "${TODAY}"

os.makedirs(out_dir, exist_ok=True)

with open(src_path, "r", encoding="utf-8") as f:
    src = json.load(f)

def transform_character(c):
    return {
        "id": c.get("id", "char_1"), "name": c.get("name", ""),
        "position_x": c.get("position_x", 0), "position_y": c.get("position_y", 0.05),
        "position_z": c.get("position_z", 0), "rotation": c.get("rotation", 0),
        "color": c.get("color", ""), "robeColor": c.get("robeColor", ""),
        "description": c.get("description", c.get("role", "")),
        "glbModel": c.get("glbModel", "/models/" + c.get("name","Character").replace(" ","") + ".glb")
    }

def transform_dialog(d):
    return {
        "character_id": d.get("character_id", ""),
        "question": d.get("trigger", d.get("question", "")),
        "answer": d.get("text", d.get("answer", ""))
    }

def transform_fact(f, chars):
    char_id = chars[0]["id"] if chars else "char_1"
    text = f.get("title","") + ": " + f.get("content","")
    if f.get("era"): text += " (" + f.get("era","") + ")"
    return {"character_id": char_id, "fact": text}

def transform_screens(s):
    return {
        "left_image_url": s.get("left_image_url", ""),
        "right_image_url": s.get("right_image_url", ""),
        "left_label": s.get("left_label", s.get("title", "")),
        "right_label": s.get("right_label", "")
    }

chars = [transform_character(c) for c in src.get("characters", [])]
result = {
    "characters": chars,
    "dialogs": [transform_dialog(d) for d in src.get("dialogs", [])],
    "facts": [transform_fact(f, chars) for f in src.get("facts", [])],
    "screens": transform_screens(src.get("screens", {}))
}

with open(os.path.join(out_dir, lesson_id + ".json"), "w", encoding="utf-8") as f:
    json.dump(result, f, indent=2, ensure_ascii=False)
print(f"  → public/data/{lesson_id}.json (transformed)")

# Ενημέρωση manifest.json
manifest_path = os.path.join(out_dir, "manifest.json")
try:
    with open(manifest_path, "r", encoding="utf-8") as f:
        manifest = json.load(f)
except:
    manifest = {"scenarios": []}
if "scenarios" not in manifest:
    manifest["scenarios"] = []

entry = {"file": lesson_id + ".json", "title": title,
         "description": f"Μάθημα: {title} ({today})", "thumbnail": ""}
existing = next((s for s in manifest["scenarios"] if s.get("file") == lesson_id + ".json"), None)
if existing:
    manifest["scenarios"][manifest["scenarios"].index(existing)] = entry
    print(f"  ~ Updated manifest: {lesson_id}")
else:
    manifest["scenarios"].append(entry)
    print(f"  + Added to manifest: {lesson_id}")

with open(manifest_path, "w", encoding="utf-8") as f:
    json.dump(manifest, f, indent=2, ensure_ascii=False)
print("manifest.json written.")
PYEOF

          cd /tmp/history-explorer-3d
          git add public/data/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "lesson-data: update history3d ${LESSON_ID} [bot]"
          git push
          echo "✅ history-explorer-3d updated (lesson: ${LESSON_ID})"

      # ════════════════════════════════════════════════════════════
      # 🧠 MIND PALACE → mind-palace-cases
      # Αντιγράφει σε cases/<id>.json + ενημερώνει catalog.json
      # ════════════════════════════════════════════════════════════
      - name: Push → mind-palace-cases
        if: steps.changed.outputs.mindpalace != '0'
        env:
          PAT: ${{ secrets.DEPLOY_PAT }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/dporpatonelis-crypto/mind-palace-cases.git /tmp/mind-palace-cases

          CASE_ID=$(jq -r '.case_id // "lesson"' data/current/mindpalace.json 2>/dev/null || echo "lesson")
          TITLE=$(jq -r '.title // "Μάθημα"' data/current/mindpalace.json 2>/dev/null || echo "Μάθημα")
          LESSON_TYPE=$(jq -r '.method // "theological_concept"' data/current/mindpalace.json 2>/dev/null || echo "theological_concept")
          TODAY=$(date +%Y-%m-%d)

          mkdir -p /tmp/mind-palace-cases/cases
          cp data/current/mindpalace.json /tmp/mind-palace-cases/cases/${CASE_ID}.json
          [ -f data/current/active_lesson.json ] && cp data/current/active_lesson.json /tmp/mind-palace-cases/active_lesson.json

          python3 - <<PYEOF
import json, os

catalog_path = "/tmp/mind-palace-cases/catalog.json"
try:
    with open(catalog_path, "r", encoding="utf-8") as f:
        catalog = json.load(f)
except:
    catalog = {"scenarios": []}
if "scenarios" not in catalog:
    catalog["scenarios"] = []

case_id = "${CASE_ID}"
entry = {
    "id": case_id, "title": "${TITLE}", "type": "${LESSON_TYPE}",
    "status": "complete", "scenarioFile": f"cases/{case_id}.json",
    "updatedAt": "${TODAY}"
}
existing = next((s for s in catalog["scenarios"] if s["id"] == case_id), None)
if existing:
    catalog["scenarios"][catalog["scenarios"].index(existing)] = entry
    print(f"  ~ Updated: {case_id}")
else:
    catalog["scenarios"].append(entry)
    print(f"  + Added: {case_id}")

with open(catalog_path, "w", encoding="utf-8") as f:
    json.dump(catalog, f, indent=2, ensure_ascii=False)
print("catalog.json written.")
PYEOF

          cd /tmp/mind-palace-cases
          git add cases/ catalog.json active_lesson.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "lesson-data: update mind palace ${CASE_ID} [bot]"
          git push
          echo "✅ mind-palace-cases updated (case: ${CASE_ID})"

      # ════════════════════════════════════════════════════════════
      # 🌐 PERSONAL PAGE + NOTEBOOK → personal-page
      # notebook.json και personalpage.json στέλνουν και τα δύο
      # στο ίδιο repo. Ενημερώνει public/data/lessons/index.json
      # ════════════════════════════════════════════════════════════
      - name: Push → personal-page
        if: steps.changed.outputs.personalpage != '0' || steps.changed.outputs.notebook != '0'
        env:
          PAT: ${{ secrets.DEPLOY_PAT }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/dporpatonelis-crypto/personal-page.git /tmp/personal-page

          LESSON_ID=$(jq -r '.lesson_id // "lesson"' data/current/active_lesson.json 2>/dev/null || echo "lesson")
          TODAY=$(date +%Y-%m-%d)
          LESSONS_DIR="/tmp/personal-page/public/data/lessons"
          mkdir -p "$LESSONS_DIR"

          # Αν υπάρχει personalpage.json, χρησιμοποίησέ το (προτεραιότητα)
          # αλλιώς χρησιμοποίησε notebook.json (ίδιο schema)
          if [ -f data/current/personalpage.json ]; then
            SOURCE="data/current/personalpage.json"
          else
            SOURCE="data/current/notebook.json"
          fi

          cp "$SOURCE" "$LESSONS_DIR/${LESSON_ID}.json"
          echo "  → public/data/lessons/${LESSON_ID}.json"

          # Ενημέρωση index.json
          python3 - <<PYEOF
import json, os

index_path = "/tmp/personal-page/public/data/lessons/index.json"
lesson_file = "${LESSON_ID}.json"

try:
    with open(index_path, "r", encoding="utf-8") as f:
        index = json.load(f)
    if not isinstance(index, list):
        index = []
except:
    index = []

if lesson_file not in index:
    index.append(lesson_file)
    print(f"  + Added to index: {lesson_file}")
else:
    print(f"  ~ Already in index: {lesson_file}")

with open(index_path, "w", encoding="utf-8") as f:
    json.dump(index, f, indent=2, ensure_ascii=False)
print("index.json written.")
PYEOF

          cd /tmp/personal-page
          git add public/data/lessons/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "lesson-data: update personal page ${LESSON_ID} [bot]"
          git push
          echo "✅ personal-page updated (lesson: ${LESSON_ID})"

      # ════════════════════════════════════════════════════════════
      # Summary
      # ════════════════════════════════════════════════════════════
      - name: Summary
        if: always()
        run: |
          echo "## 📤 Distribution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| App | Repo | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 🗺️ Timeline Explorer   | Map-Timeline        | ${{ steps.changed.outputs.timeline != '0' && '✅ pushed' || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🕵️ Investigation Board | idea-weaver-board   | ${{ steps.changed.outputs.investigation != '0' && '✅ pushed' || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏛️ History Explorer 3D | history-explorer-3d | ${{ steps.changed.outputs.history3d != '0' && '✅ pushed' || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧠 Mind Palace Debate  | mind-palace-cases   | ${{ steps.changed.outputs.mindpalace != '0' && '✅ pushed' || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Personal Page       | personal-page       | ${{ (steps.changed.outputs.personalpage != '0' || steps.changed.outputs.notebook != '0') && '✅ pushed' || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
